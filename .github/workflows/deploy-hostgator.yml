name: Deploy frontend to Hostgator

# Quando dispara:
#   - push em master tocando apps/web/** (build do site)
#   - dispatch manual no Actions UI (botão "Run workflow")
on:
  push:
    branches: [master]
    paths:
      - "apps/web/**"
      - "shared/sdk/**"
      - ".github/workflows/deploy-hostgator.yml"
  workflow_dispatch:

# Cancela builds antigos se nova mudança chega
concurrency:
  group: deploy-hostgator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install all workspaces
        run: npm ci

      - name: Build Vite (production)
        working-directory: apps/web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_LEGACY_APP_ID: ${{ secrets.VITE_LEGACY_APP_ID }}
          VITE_LEGACY_APP_BASE_URL: ${{ secrets.VITE_LEGACY_APP_BASE_URL }}
          VITE_APP_BASE_URL: https://sigoobras.com.br
          VITE_APP_NAME: SIGO Obras
          VITE_DATA_BACKEND: supabase
        run: npm run build

      - name: Verify build artifacts
        run: |
          ls -la apps/web/dist
          test -f apps/web/dist/index.html || (echo "::error::dist/index.html ausente"; exit 1)
          test -f apps/web/dist/.htaccess || (echo "::error::dist/.htaccess ausente (esqueceu public/.htaccess?)"; exit 1)

      # Deploy via lftp — ferramenta nativa Linux, controle preciso de paths.
      # Substituiu o SamKirkland/FTP-Deploy-Action que tinha bug criando
      # diretório "C:/" no servidor mesmo em chroot limpo.
      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via lftp (mirror)
        env:
          FTP_HOST: ${{ secrets.HOSTGATOR_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTGATOR_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTGATOR_FTP_PASS }}
          # FTP_DIR é o destino remoto. Geralmente "/" pra chroot do FTP user
          # já ser a pasta do site. Se precisar de subdiretório, ajuste o secret.
          FTP_DIR: ${{ secrets.HOSTGATOR_FTP_DIR }}
        run: |
          cd apps/web/dist
          echo "Arquivos a enviar:"
          find . -type f | wc -l

          # IMPORTANTE: usamos `mirror ./ /` direto SEM `cd` antes.
          # O FTP user (cPanel) já está chrootado na pasta do site, então
          # `/` aqui = raiz do site. Tentar `cd` em algum subdiretório
          # pode entrar na pasta lixo "C:/" que sobrou de deploys antigos.
          lftp -c "
            set ftp:ssl-allow no;
            set ssl:verify-certificate no;
            set net:max-retries 3;
            set net:timeout 30;
            open -u '$FTP_USER','$FTP_PASS' 'ftp://$FTP_HOST';
            pwd;
            mirror \
              --reverse \
              --delete \
              --verbose \
              --exclude-glob '.well-known/' \
              --exclude-glob '.well-known/**' \
              --exclude-glob 'sigoobras-deploy-*.zip' \
              --exclude-glob 'C:/' \
              --exclude-glob 'C:/**' \
              ./ /;
            bye;
          "
          echo "::notice::✅ Deploy concluído via lftp"

      - name: Notify result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::Site: https://sigoobras.com.br"
          else
            echo "::error::Deploy falhou — ver logs acima"
          fi
