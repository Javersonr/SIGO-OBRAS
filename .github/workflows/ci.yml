name: CI

# Roda em todo PR e em push no master. Garante que código quebrado não merge.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Lint + Format: barato, falha rápido
  # -------------------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          # Node 22 traz WebSocket nativo, requerido pelo @supabase/realtime-js
          # que o smoke-test do SDK instancia indiretamente. Node 20 quebrava
          # com "Node.js 20 detected without native WebSocket support".
          node-version: "22"
          cache: "npm"

      # npm workspaces: lockfile único na raiz, instala tudo de uma vez
      - name: Install all workspaces
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint (apps/web)
        run: npm run lint --workspace=apps/web

  # -------------------------------------------------------------------------
  # Build do frontend: garante que dist/ é gerado sem erro
  # -------------------------------------------------------------------------
  build-web:
    name: Build apps/web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          # Node 22 traz WebSocket nativo, requerido pelo @supabase/realtime-js
          # que o smoke-test do SDK instancia indiretamente. Node 20 quebrava
          # com "Node.js 20 detected without native WebSocket support".
          node-version: "22"
          cache: "npm"

      - name: Install all workspaces
        run: npm ci

      - name: Vite build
        working-directory: apps/web
        env:
          # Valores reais via GH Secrets em prod; fallback p/ placeholders no CI
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
          VITE_LEGACY_APP_ID: ${{ secrets.VITE_LEGACY_APP_ID || 'placeholder' }}
          VITE_LEGACY_APP_BASE_URL: ${{ secrets.VITE_LEGACY_APP_BASE_URL || 'https://placeholder.example.com' }}
        run: npm run build

      - name: Upload build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.run_id }}
          path: apps/web/dist
          retention-days: 7

  # -------------------------------------------------------------------------
  # SDK smoke test: chama Supabase de teste, valida API surface
  # Skip se VITE_SUPABASE_URL não estiver configurado (PRs de fork, etc.)
  # -------------------------------------------------------------------------
  test-sdk:
    name: Test @sigoobras/sdk
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          # Node 22 traz WebSocket nativo, requerido pelo @supabase/realtime-js
          # que o smoke-test do SDK instancia indiretamente. Node 20 quebrava
          # com "Node.js 20 detected without native WebSocket support".
          node-version: "22"
          cache: "npm"

      - name: Install all workspaces
        run: npm ci

      - name: Smoke test (se secrets disponíveis)
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::warning::VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY não setados — pulando smoke test"
            exit 0
          fi
          npm run sdk:test

  # -------------------------------------------------------------------------
  # Migrations dry-check: garante que SQL é parseável
  # (não aplica nada — só verifica sintaxe básica)
  # -------------------------------------------------------------------------
  check-migrations:
    name: Check Supabase migrations
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: List migrations
        run: |
          ls -la supabase/migrations/
          echo "Total: $(ls supabase/migrations/*.sql | wc -l) migrations"

      - name: Validate SQL files exist and aren't empty
        run: |
          for f in supabase/migrations/*.sql; do
            if [ ! -s "$f" ]; then
              echo "::error file=$f::Migration file is empty"
              exit 1
            fi
          done
          echo "✅ All migrations OK"

  # -------------------------------------------------------------------------
  # Status final: agrega todos os jobs (útil pra branch protection)
  # -------------------------------------------------------------------------
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, build-web, test-sdk, check-migrations]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.build-web.result }}" != "success" ] || \
             [ "${{ needs.test-sdk.result }}" != "success" ] || \
             [ "${{ needs.check-migrations.result }}" != "success" ]; then
            echo "::error::Um ou mais jobs falharam"
            exit 1
          fi
          echo "✅ CI verde"
