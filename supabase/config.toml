# ============================================================================
# Supabase config — SIGO Obras
# ============================================================================
# https://supabase.com/docs/guides/cli/config
# Aplicado APENAS para o ambiente local (supabase start).
# Configurações do projeto hosted são feitas pelo Dashboard.
# ============================================================================

project_id = "sigoobras"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "https://sigoobras.com.br",
  "https://www.sigoobras.com.br",
  "http://localhost:5173",
  "http://localhost:4173"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # vamos usar convite customizado, não confirm padrão
secure_password_change = true
max_frequency = "1s"

[auth.sms]
enable_signup = false
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"

[analytics]
enabled = false
